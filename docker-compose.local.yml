services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 22-alpine
    container_name: ph1l74-frontend-local
    restart: unless-stopped
    
    # Port mapping for local access
    ports:
      - "3000:3000"
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000

