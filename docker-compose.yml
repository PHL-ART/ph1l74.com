services:
  ph1l74-com:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 22-alpine
    container_name: ph1l74-com
    restart: unless-stopped
        
    # Health check - УПРОЩЕННЫЙ для совместимости с Alpine
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--header=Host: ph1l74.com",
          "--header=X-Forwarded-Proto: https",
          "--spider",
          "http://localhost:3000/api/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Networks for Traefik
    networks:
      - ph1l74-network
    
    # Traefik labels for automatic configuration
    labels:
      # Enable Traefik for this container
      - "traefik.enable=true"
      
      # HTTP router
      - "traefik.http.routers.ph1l74-com.rule=Host(`ph1l74.com`) || Host(`www.ph1l74.com`)"
      - "traefik.http.routers.ph1l74-com.entrypoints=web"
      
      # HTTPS router
      - "traefik.http.routers.ph1l74-com-secure.rule=Host(`ph1l74.com`) || Host(`www.ph1l74.com`)"
      - "traefik.http.routers.ph1l74-com-secure.entrypoints=websecure"
      - "traefik.http.routers.ph1l74-com-secure.tls=true"
      - "traefik.http.routers.ph1l74-com-secure.tls.certresolver=letsencrypt"
      
      # Service configuration - Next.js runs on port 3000
      - "traefik.http.services.ph1l74-com.loadbalancer.server.port=3000"
      
      # Middleware 1: HTTPS redirect
      - "traefik.http.middlewares.ph1l74-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.ph1l74-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.ph1l74-com.middlewares=ph1l74-redirect"
      
      # Middleware 2: Security headers
      - "traefik.http.middlewares.ph1l74-headers.headers.sslredirect=true"
      - "traefik.http.middlewares.ph1l74-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.ph1l74-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.ph1l74-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.ph1l74-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.ph1l74-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.ph1l74-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.ph1l74-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      
      # Middleware 3: Rate limiting
      - "traefik.http.middlewares.ph1l74-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.ph1l74-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.ph1l74-ratelimit.ratelimit.period=1m"
      
      # Middleware 4: WWW to non-WWW redirect
      - "traefik.http.middlewares.ph1l74-www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.ph1l74-www-redirect.redirectregex.replacement=https://$$1"
      - "traefik.http.middlewares.ph1l74-www-redirect.redirectregex.permanent=true"
      
      # Apply all middlewares to HTTPS router (order matters!)
      - "traefik.http.routers.ph1l74-com-secure.middlewares=ph1l74-www-redirect,ph1l74-ratelimit,ph1l74-headers"
    
    # Environment variables
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PORT=3000

networks:
  ph1l74-network:
    external: true
    name: ph1l74-network

